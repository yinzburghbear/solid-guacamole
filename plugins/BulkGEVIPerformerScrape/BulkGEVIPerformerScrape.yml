name: Bulk GEVI Performer Scrape
description: Bulk scrape selected performers with the installed GEVI scraper, applying only explicitly selected fields.
version: 1.0.0
url: https://github.com/yinzburghbear/solid-guacamole
exec:
  - python
  - BulkGEVIPerformerScrape.py
interface: raw
tasks:
  - name: Scrape selected performers
    description: Scrapes performer IDs supplied by the performer-list bulk action.
ui:
  javascript:
    - BulkGEVIPerformerScrape.js
